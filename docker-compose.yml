services:
  # 1. Vector Database: ChromaDB
  chroma:
    image: chromadb/chroma:0.4.24
    container_name: contract_chroma_db
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped

  # 2. Backend: FastAPI Application
  api:
    build: .
    container_name: contract_api_service
    working_dir: /code
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    depends_on:
      - chroma
    env_file:
      - .env
    # Runs main:app directly from the /code directory
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # 3. Frontend: Streamlit Dashboard
  frontend:
    build: .
    container_name: contract_frontend
    working_dir: /code
    ports:
      - "8501:8501"
    volumes:
      - .:/code
    depends_on:
      - api
    env_file:
      - .env
    command: >
      streamlit run frontend.py 
      --server.port 8501 
      --server.address 0.0.0.0 
      --server.enableCORS true 
      --server.enableXsrfProtection false
    restart: unless-stopped

volumes:
  chroma_data: